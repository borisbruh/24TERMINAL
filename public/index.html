<!DOCTYPE html> <!--index.html-->
<html>
<head>

	<title>24TERMINAL</title>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	
</head>




<body>
<div id="monitor-wrapper">

	<div id="monitor">
	
	
		<div class="camera-buttons">
		
			<div class="camera-group">
			
				<div class="camera-label">RESET</div>
				<button id="btnRESET" class="camera-btn"></button>
				
			</div>
		
			<div class="camera-group">
			
				<div class="camera-label">IRFD</div>
				<button id="btnIRFD" class="camera-btn"></button>
				
			</div>
			
			<div class="camera-group">
			
				<div class="camera-label">IMLR</div>
				<button id="btnIMLR" class="camera-btn"></button>
				
			</div>

			<div class="camera-group">
			
				<div class="camera-label">ITKO</div>
				<button id="btnITKO" class="camera-btn"></button>
				
			</div>
			
			<div class="camera-group">
			
				<div class="camera-label">IPPH</div>
				<button id="btnIPPH" class="camera-btn"></button>
				
			</div>

			<div class="camera-group">
			
				<div class="camera-label">IZOL</div>
				<button id="btnIZOL" class="camera-btn"></button>
				
			</div>

			<div class="camera-group">
			
				<div class="camera-label">ILAR</div>
				<button id="btnILAR" class="camera-btn"></button>
				
			</div>


			<div class="camera-group">
			
				<div class="camera-label">IBTH</div>
				<button id="btnIBTH" class="camera-btn"></button>
				
			</div>

			<div class="camera-group">
			
				<div class="camera-label">IGRV</div>
				<button id="btnIGRV" class="camera-btn"></button>
				
			</div>

			<div class="camera-group">
			
				<div class="camera-label">ISAU</div>
				<button id="btnISAU" class="camera-btn"></button>
				
			</div>
			
		</div>
	
	
		<div id="controls">
		
			<div class="knob-container">
				<div class="knob" id="sweepKnob"></div>
				<div class="knob-label">SWEEP</div>
			</div>

			<div class="knob-container">
				<div class="knob" id="pingKnob"></div>
				<div class="knob-label">PING</div>
			</div>
			
			<div class="knob-container">
				<div class="knob" id="zoomKnob"></div>
				<div class="knob-label">ZOOM</div>
			</div>
			
			<div id="plane-controls">
				<button id="prevPlane">◀ Prev</button>
			</div>
			
			<div id="plane-controls">
				<button id="nextPlane">Next ▶</button>
			</div>
			
			<div class="knob-container">
				<div class="knob" id="tKnob"></div>
				<div class="knob-label">Terminal</div>
			</div>
			
			<div class="switch-container">
				<div id="runwaySwitch" class="switch">
					<div class="switch-handle"></div>
				</div>
				<div class="switch-label">RUNWAYS</div>
			</div>
			
			<div class="switch-container">
				<div id="trackSwitch" class="switch">
					<div class="switch-handle"></div>
				</div>
				<div class="switch-label">TRACK</div>
			</div>


			
		</div>


		<div id="screen">

			<div id="viewport">
			
				<div id="radar">
				
					  <div id="clutter"></div>
					  <div id="sweep"></div>
					  <div id="rings"></div>
					  
					  
					  
				</div>
				
				<div id="radar-stats"></div>
				
			</div>

				<div id="terminal">
				<div id="terminal-output"></div>
				
			</div>

		</div>

	</div>
</div>

	<script src="script.js"></script>

</body>







</html>
